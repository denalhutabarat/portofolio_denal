<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Denal | Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        :root {
            --primary: #ec9e4a;
            --bg: #010101;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            text-align: center;
        }

        /* Navbar sesuai index.html */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.4rem 7%;
            background-color: rgba(1, 1, 1, 0.8);
            border-bottom: 1px solid #333;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 9999;
        }

        .navbar .navbar-logo {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
        }

        .navbar .navbar-logo span {
            color: var(--primary);
        }

        /* Game Selection */
        #selection-screen {
            padding: 10rem 7% 2rem;
        }

        .game-grid {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 2rem;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            width: 250px;
            border: 1px solid #333;
        }

        .game-card:hover {
            border-color: var(--primary);
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.1);
        }

        .game-card i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        /* Layar Main */
        #game-screen {
            display: none;
            padding-top: 8rem;
        }

        canvas {
            border: 4px solid var(--primary);
            background: #000;
            box-shadow: 0 0 20px rgba(236, 158, 74, 0.3);
        }

        .score-box {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--primary);
            font-weight: bold;
        }

        .btn-ctrl {
            padding: 15px 25px;
            font-size: 20px;
            margin: 5px;
            cursor: pointer;
            background: var(--primary);
            border: none;
            color: white;
            border-radius: 10px;
        }

        .exit-btn {
            background: #ff4444;
            padding: 10px 20px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        /* Music Playlist Menu */
        .music-dropdown {
            display: none;
            position: fixed;
            top: 70px;
            right: 7%;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 15px;
            width: 200px;
            z-index: 10000;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .music-dropdown.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .music-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .music-item:hover {
            background: rgba(236, 158, 74, 0.2);
            color: var(--primary);
        }

        .music-item i {
            font-size: 1rem;
        }

        .music-dropdown.active {
            display: block !important;
            /* Tambahkan !important jika masih membandel */
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="navbar-left">
            <a href="javascript:void(0)" onclick="window.history.back()" class="btn-back">
                <i data-feather="arrow-left"></i>
            </a>
        </div>

        <a href="index.html" class="navbar-logo">Portofolio <span>Denal</span></a>

        <div class="navbar-spacer"></div>
    </nav>

    <div id="selection-screen">
        <h2>Pilih Game</h2>
        <div class="game-grid">
            <div class="game-card" onclick="playGame('snake')">
                <i class="fas fa-gamepad"></i>
                <h3>Snake Game</h3>
            </div>

            <div class="game-card" onclick="playGame('block')">
                <i class="fas fa-cubes"></i>
                <h3>Block Game</h3>
            </div>
        </div>
    </div>
    
    <div id="register-zone"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; flex-direction:column; align-items:center; justify-content:center;">
        <div
            style="background:#111; padding:30px; border-radius:15px; border:1px solid var(--primary); text-align:center;">
            <h2 style="color:var(--primary); margin-bottom:20px;">Selamat Datang!</h2>
            <p>Masukkan namamu untuk masuk ke Leaderboard</p>
            <input type="text" id="username" placeholder="Nama kamu..."
                style="padding:10px; border-radius:5px; border:none; width:80%;">
            <br><br>
            <button onclick="daftarUser()"
                style="background:var(--primary); color:white; border:none; padding:10px 30px; border-radius:5px; cursor:pointer; font-weight:bold;">MULAI
                MAIN</button>
        </div>
    </div>

    <div id="leaderboard-section" style="margin: 50px auto; max-width: 500px; padding: 20px;">
        <h2 style="color:var(--primary);"><i class="fas fa-trophy"></i> Top 10 Leaderboard</h2>
        <button onclick="loadBoard('snake')" class="btn-ctrl">Snake</button>
        <button onclick="loadBoard('block')" class="btn-ctrl">Block</button>
        <table id="leaderboard-table"
            style="width:100%; border-collapse: collapse; margin-top:20px; background: rgba(255,255,255,0.05); border-radius:10px; overflow:hidden;">
            <thead style="background: var(--primary); color: black;">
                <tr>
                    <th style="padding:10px;">Rank</th>
                    <th>Nama</th>
                    <th>Skor</th>
                </tr>
            </thead>
            <tbody style="text-align:center;">
            </tbody>
        </table>
    </div>

    <!-- 🔥 MODAL INPUT NAMA -->
    <div id="nameModal" style="
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
">
        <div style="background:#111;padding:20px;border-radius:10px;text-align:center;">
            <h2>Masukkan Nama</h2>
            <input type="text" id="playerName" placeholder="Nama kamu..." style="padding:10px">
            <br><br>
            <button onclick="saveName()">Mulai</button>
        </div>
    </div>

    <div id="game-screen">
        <button class="exit-btn" onclick="location.reload()"><i class="fas fa-arrow-left"></i> Ganti Game</button>
        <div class="score-container" style="margin: 20px 0; font-family: 'Poppins', sans-serif;">
            <div style="font-size: 1.5rem;">Skor: <span id="current-score">0</span></div>
            <div style="color: #ffffff; font-size: 1.5rem;">Terbaik: <span id="high-score">0</span></div>
        </div>
        <canvas id="mainCanvas"></canvas>

        <div class="controls" id="snake-ctrl" style="display:none; margin-top:20px;">
            <button class="btn-ctrl" onmousedown="setDir('UP')" ontouchstart="setDir('UP')">▲</button><br>
            <button class="btn-ctrl" onmousedown="setDir('LEFT')" ontouchstart="setDir('LEFT')">◀</button>
            <button class="btn-ctrl" onmousedown="setDir('DOWN')" ontouchstart="setDir('DOWN')">▼</button>
            <button class="btn-ctrl" onmousedown="setDir('RIGHT')" ontouchstart="setDir('RIGHT')">▶</button>
        </div>

        <div class="controls" id="block-ctrl" style="display:none; margin-top:20px;">
            <button class="btn-ctrl" onclick="moveB('L')">◀ Kiri</button>
            <button class="btn-ctrl" onclick="moveB('D')">▼ Turun</button>
            <button class="btn-ctrl" onclick="moveB('R')">Kanan ▶</button>
        </div>
    </div>

    <script type="module">
        // Import fungsi game
        import { initSnakeGame } from './snake.js';
        import { initBlockGame } from './block.js';

        // Daftarkan fungsi ke window agar dikenali oleh tombol HTML
        window.playGame = function (type) {
            console.log("Mencoba memainkan:", type); // Cek ini di Console F12

            const selectionScreen = document.getElementById('selection-screen');
            const gameScreen = document.getElementById('game-screen');
            const snakeCtrl = document.getElementById('snake-ctrl');
            const blockCtrl = document.getElementById('block-ctrl');
            const leaderboard = document.getElementById('leaderboard-section');

            // ⛔ sembunyikan menu & leaderboard
            selectionScreen.style.display = 'none';
            leaderboard.style.display = 'none';

            // ✅ tampilkan game
            gameScreen.style.display = 'block';

            if (type === 'snake') {
                snakeCtrl.style.display = 'block';
                blockCtrl.style.display = 'none';
                initSnakeGame();
            } else if (type === 'block') {
                blockCtrl.style.display = 'block';
                snakeCtrl.style.display = 'none';
                initBlockGame();
            }
        };

        // Pastikan ikon ter-render
        if (typeof feather !== 'undefined') {
            feather.replace();
        }
    </script>

    <script>
        // 1. Inisialisasi Data & Nama
        const SUPABASE_URL = "https://edhdqozlowmybmmtaqng.supabase.co";
        const SUPABASE_KEY = "sb_publishable_ZjVEIJNRJ7Iw8IvHRvqv6w_udas_hdP";

        function loadBoard(game) {
            muatLeaderboard(game);
        }

        async function initApp() {
            const savedName = localStorage.getItem("p_name");

            if (savedName) {
                window.PLAYER_NAME = savedName;
                document.getElementById("nameModal").style.display = "none";
                document.getElementById("selection-screen").style.display = "block";
            } else {
                document.getElementById("nameModal").style.display = "block";
            }

            // Load tabel juara saat startup
            muatLeaderboard();
        }

        // 2. Fungsi Simpan Nama ke LocalStorage
        function saveName() {
            const nameInput = document.getElementById("playerName").value.trim();
            if (nameInput) {
                localStorage.setItem("p_name", nameInput);
                window.PLAYER_NAME = nameInput;
                document.getElementById("nameModal").style.display = "none";
                document.getElementById("selection-screen").style.display = "block";
            } else {
                alert("Isi nama dulu ya!");
            }
        }

        // 3. Fungsi Ambil Data dari Supabase
        async function muatLeaderboard(game = "snake") {
            const url = `${SUPABASE_URL}/rest/v1/scores?select=player_name,score&game_type=eq.${game}&order=score.desc&limit=10`;

            try {
                const res = await fetch(url, {
                    headers: {
                        apikey: SUPABASE_KEY,
                        Authorization: `Bearer ${SUPABASE_KEY}`
                    }
                });

                const data = await res.json();
                const tbody = document.querySelector("#leaderboard-table tbody");

                tbody.innerHTML = data.map((item, i) => `
            <tr>
                <td>${i + 1}</td>
                <td>${item.player_name}</td>
                <td>${item.score}</td>
            </tr>
        `).join('');

            } catch (err) {
                console.error(err);
            }
        }

        window.onload = () => {
            initApp();
            muatLeaderboard("snake"); // default snake
        };
    </script>

    <script>
        feather.replace();
    </script>

    <script src="https://unpkg.com/feather-icons"></script>
</body>

</html>
